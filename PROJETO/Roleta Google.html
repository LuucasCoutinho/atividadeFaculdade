<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>    
   
    <style>

        body{margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;  
                   
        }

        div{
            width: 64px;
            height: 64px;
            border: #ccc 5px solid;
            margin: 10px;
            background-image: url(./assets/images/google_sprite.png);
            transition-duration: 0.8s;
            transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
            box-shadow: 10px 10px 10px 3px;
            transform: view-box;
            animation: girar 4s linear infinite;


        }

       
             
        div.icon-1{background-position: 0 calc(-69px * 1);}
        div.icon-2{background-position: 0 calc(-69px * 2);}
        div.icon-3{background-position: 0 calc(-69px * 3);}
        div.icon-4{background-position: 0 calc(-69px * 4);}
        div.icon-5{background-position: 0 calc(-69px * 5);}
        div.icon-6{background-position: 0 calc(-69px * 6);}
        div.icon-7{background-position: 0 calc(-69px * 7);}
        div.icon-8{background-position: 0 calc(-69px * 8);}

         div.icon-1:hover{background-position: 0 calc(-69px * 20);}
         div.icon-2:hover{background-position: 0 calc(-69px * 19);}
         div.icon-3:hover{background-position: 0 calc(-69px * 18);}
         div.icon-4:hover{background-position: 0 calc(-69px * 17);}
         div.icon-5:hover{background-position: 0 calc(-69px * 16);}
         div.icon-6:hover{background-position: 0 calc(-69px * 15);}
         div.icon-7:hover{background-position: 0 calc(-69px * 14);}
         div.icon-8:hover{background-position: 0 calc(-69px * 13);}

</style>

</head>
<body>
    <div class="icon-1"></div>
    <div class="icon-2"></div>
    <div class="icon-3"></div>
    <div class="icon-4"></div>
    <div class="icon-5"></div>
    <div class="icon-6"></div>
    <div class="icon-7"></div>
    <div class="icon-8"></div>

        </body>
</html>
